# Conda environment for SAE clustering experiments
# (No Evo2/GPU dependencies - just data analysis)
#
# Create: conda env create -f environment.yml
# Activate: conda activate evo2-sae

name: evo2-sae

channels:
  - conda-forge
  - defaults

dependencies:
  - python=3.10
  - numpy
  - pandas
  - matplotlib
  - scikit-learn
  - scipy
  - tqdm
  - pillow
