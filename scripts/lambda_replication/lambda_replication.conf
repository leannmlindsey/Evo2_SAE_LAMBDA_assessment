# Evo2 + SAE LAMBDA_v1 replication config.
#
# Sourced by:
#   scripts/lambda_replication/run_lambda_training.sh
#   scripts/lambda_replication/run_lambda_inference.sh
#   scripts/lambda_replication/check_training.sh
#   scripts/lambda_replication/check_inference.sh
#
# Workflow (DIRECT execution — single NCBI server, NO SLURM):
#   1. Edit this file: set LAMBDA_BASE + OUTPUT_DIR (and confirm MODEL/LAYER).
#   2. bash scripts/lambda_replication/run_lambda_training.sh
#   3. bash scripts/lambda_replication/check_training.sh
#   4. bash scripts/lambda_replication/run_lambda_inference.sh
#   5. bash scripts/lambda_replication/check_inference.sh
#
# This runs on a SINGLE NCBI server with NO scheduler and NO environment modules.
# The server is ONLINE — HuggingFace weights (Evo2 + the SAE repo) download on
# first use; there is NO prefetch / offline step.
#
# Evo2 is a frozen generative DNA language model — it does NOT finetune. We produce
# THREE harvest-canonical variants:
#   evo2_lp   Evo2 embeddings -> linear probe          (trained in Stage 1)
#   evo2_nn   Evo2 embeddings -> 3-layer NN            (trained in Stage 1)
#   evo2_sae  zero-shot SAE feature f/19746            (NO training; threshold rules)
# Stage 1 trains the lp + nn classifiers (one embedding_analysis run per window;
# it writes linear_probe.pkl + three_layer_nn.pt + scalers AND
# embedding_analysis_results.json with pretrained-vs-random metrics = Surface D).
# Stage 2 runs ALL THREE variants through the unified batch_inference.py (loads
# Evo2 ONCE) over the diagnostics + genome-wide CSVs, then renames the outputs into
# the harvest-canonical inference/<variant>/ layout. The SAE needs no Stage 1.

# --- REQUIRED: EDIT THESE -----------------------------------------------------

# LAMBDA_v1 dataset root. SET THIS to the dataset path on the server. Expected
# structure (LAMBDA_v1 layout):
#   $LAMBDA_BASE/train_val_test/<W>/{train,val,test}.csv      mixed phage+bacteria
#   $LAMBDA_BASE/fpr_test/<W>/bacteria_segments_<W>.csv       bacteria-only (FPR control)
#   $LAMBDA_BASE/shuffled_controls/<W>/test_shuffled.csv      GC-preserving shuffled control
#   $LAMBDA_BASE/fnr_test/<W>/...                             phage-only (FNR control; see FNR_<W>)
#   $LAMBDA_BASE/genome_wide/<W>/*.csv                        per-window genome-wide segment CSVs
export LAMBDA_BASE="/path/to/LAMBDA_v1"

# Replication output root. SET THIS to a writable path on the server. Per-window
# results land under here:
#   $OUTPUT_DIR/<W>/embedding/                linear_probe.pkl, three_layer_nn.pt,
#                                             *_scaler.pkl, embedding_analysis_results.json
#   $OUTPUT_DIR/<W>/inference/<variant>/      <diag>_predictions.csv (+ _predictions_metrics.json),
#                                             genome_wide_<stem>_predictions.csv (+ _metrics.json)
export OUTPUT_DIR="/path/to/evo2_lambda_outputs"

# Window sizes to run. Subset (e.g. "2k 4k") to run fewer.
export SEGMENT_LENGTHS="2k 4k 8k"

# Harvest-canonical variants. All three run in Stage 2 inference; only evo2_lp and
# evo2_nn need a Stage 1 classifier (evo2_sae is zero-shot).
export VARIANTS="evo2_lp evo2_nn evo2_sae"

# --- Evo2 model + layer -------------------------------------------------------

# Evo2 model name (passed to `Evo2(model_name)` in the evo2 package). The package
# downloads the matching Arc Institute weights from HuggingFace on first load.
#   evo2_7b   -> 7B model   (default)
#   evo2_40b  -> 40B model  (also valid; change LAYER below to a 40b-appropriate
#                            layer — the 7B value is NOT valid for 40b)
export MODEL="evo2_7b"

# Embedding-extraction layer name. blocks.28.mlp.l3 is the 7B convention used by
# src/evo2_embedding_analysis.py and src/batch_inference.py defaults.
#   NOTE: evo2_40b has a DIFFERENT block count — set a 40b-appropriate layer here
#   when MODEL=evo2_40b (the 7B value blocks.28.mlp.l3 is NOT valid for 40b).
export LAYER="blocks.28.mlp.l3"

# Pooling over the sequence dimension: mean | first | last | max.
export POOLING="mean"

# --- Stage 1 embedding-classifier hyperparameters -----------------------------

# Random seed for the embedding analysis (single run; no seed sweep, no winners).
export EMB_SEED="42"

# Embedding-extraction batch size (matches the original run_embedding_analysis default).
export EMB_BATCH_SIZE="1"

# 3-layer NN (and linear-probe) training hyperparameters.
export NN_EPOCHS="100"
export NN_HIDDEN_DIM="256"
export NN_LR="0.001"

# Pretrained-vs-random baseline (Surface D). true -> --include_random_baseline.
export INCLUDE_RANDOM_BASELINE="true"

# OPTIONAL passthroughs (parity with the original embedding script):
#   EMB_MAX_LENGTH        -> --max_length=<n>  (empty = no truncation, the default)
#   PRETRAINED_EMBEDDINGS -> --pretrained_embeddings=<path.npz> to REUSE cached
#       embeddings. Leave EMPTY for fresh extraction (the default in a new OUTPUT_DIR).
export EMB_MAX_LENGTH=""
export PRETRAINED_EMBEDDINGS=""

# --- SAE (zero-shot) ----------------------------------------------------------

# Prophage feature index in the SAE latent space (Goodfire Evo-2-Layer-26-Mixed).
export FEATURE_IDX="19746"

# SAE pred_label rule (OR of these three): max_activation > MAX, OR
# mean_activation > MEAN, OR fraction_firing > FRACTION.
export SAE_MAX_THRESHOLD="0.5"
export SAE_MEAN_THRESHOLD="0.1"
export SAE_FRACTION_THRESHOLD="0.3"

# SAE weights HuggingFace repo (downloaded on first use — server is online; the SAE
# .pt filename sae-layer26-mixed-expansion_8-k_64.pt is hardcoded in src/batch_inference.py).
export SAE_REPO="Goodfire/Evo-2-Layer-26-Mixed"

# --- OPTIONAL: FNR diagnostics (phage-only) -----------------------------------

# FNR (false negative rate) test sets — phage-only sequences, per window. Variable
# name FNR_<W> where <W> matches an entry in SEGMENT_LENGTHS. Unset to skip FNR.
export FNR_2k="${LAMBDA_BASE}/fnr_test/2k/phage_annotated_segments_2k.csv"
export FNR_4k="${LAMBDA_BASE}/fnr_test/4k/phage_segments_4k_2k.csv"
export FNR_8k="${LAMBDA_BASE}/fnr_test/8k/phage_segments_8k_4k.csv"

# --- OPTIONAL: genome-wide inputs ---------------------------------------------

# Per-window DIRECTORY of *.csv genome-wide segment files. batch_inference runs all
# three variants (--run_sae --run_nn --run_lp) over every CSV; outputs are renamed
# to genome_wide_<stem>_predictions.csv (the harvest glob key). Missing dirs are
# warned-and-skipped. NO native 50kb scanner / nucleotide_evaluation.py /
# run_lambda_batch.py — genome-level aggregation is done CENTRALLY by harvest.
export GENOME_WIDE_2k="${LAMBDA_BASE}/genome_wide/2k"
export GENOME_WIDE_4k="${LAMBDA_BASE}/genome_wide/4k"
export GENOME_WIDE_8k="${LAMBDA_BASE}/genome_wide/8k"

# FPR (bacteria-only) and GC control (shuffled) are AUTO-DERIVED by the inference
# driver from LAMBDA_BASE — they are NOT set here:
#   ${LAMBDA_BASE}/fpr_test/<W>/bacteria_segments_<W>.csv      (FPR control)
#   ${LAMBDA_BASE}/shuffled_controls/<W>/test_shuffled.csv     (GC control)
# FPR is bacteria-only (single-class) and FNR is phage-only (single-class) — same
# as the other LAMBDA repos; inference still runs uniformly over them.

# --- OPTIONAL: inference batch + method toggles -------------------------------

export INF_BATCH_SIZE="1"

# Which inference methods to run (parity with the original; default all on).
export RUN_SAE="true"
export RUN_NN="true"
export RUN_LP="true"

# Save per-segment SAE activation .npy arrays (parity with the original, which always
# saved them). They land in OUTPUT_DIR/<W>/inference/_raw/; harvest does NOT use them
# (it clusters from genome_wide_*_predictions.csv) and on genome-wide inputs they are
# LARGE — set "false" to skip if disk is a concern.
export SAVE_ACTIVATIONS="true"

# --- Environment --------------------------------------------------------------

# Conda env with torch + the evo2 package + huggingface_hub.
export CONDA_ENV="evo2-sae"

# HuggingFace cache (OPTIONAL). The server is ONLINE — leave empty to use the
# default (~/.cache/huggingface) and let HF download weights on first use. Set a
# path only if you want the cache somewhere specific.
export HF_HOME=""
